{% extends "base.html" %}
{% block title %}Action Tracker{% endblock %}
{% block content %}
<section class="hero-card pro-hero"><div><p class="eyebrow">Follow-up</p><h3>Action Tracker</h3><p>Track issue, owner, due date and status.</p></div><a class="btn light export-btn" href="{{ url_for('export_actions') }}">[📊 Export Excel]</a></section>
<section class="panel compact-panel"><form method="POST" class="form-grid compact-form"><div class="wide"><label>Action / Issue</label><input name="title" required placeholder="Door 35 damage to follow up"></div><div><label>Owner</label><input name="owner"></div><div><label>Due Date</label><input type="date" name="due_date"></div><div><label>Status</label><select name="status"><option>Open</option><option>In Progress</option><option>Closed</option></select></div><div><label>Priority</label><select name="priority"><option>Low</option><option selected>Medium</option><option>High</option></select></div><div class="wide"><label>Notes</label><input name="notes"></div><button class="btn primary" type="submit">Add Action</button></form></section>
<section class="panel compact-panel"><div class="simple-list">{% for r in rows %}<form class="team-edit-card form-grid compact-form" method="POST" action="{{ url_for('update_action', item_id=r.id) }}"><div class="wide"><label>Action</label><input name="title" value="{{ r.title }}"></div><div><label>Owner</label><input name="owner" value="{{ r.owner or '' }}"></div><div><label>Due</label><input type="date" name="due_date" value="{{ r.due_date or '' }}"></div><div><label>Status</label><select name="status">{% for s in ['Open','In Progress','Closed'] %}<option {% if r.status==s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div><div><label>Priority</label><select name="priority">{% for s in ['Low','Medium','High'] %}<option {% if r.priority==s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div><div class="wide"><label>Notes</label><input name="notes" value="{{ r.notes or '' }}"></div><div class="wide mini-actions"><button class="small-btn" type="submit">Save</button><button class="small-btn danger-btn" formaction="{{ url_for('delete_action', item_id=r.id) }}" onclick="return confirm('Delete this action?')">Delete</button></div></form>{% else %}<p class="empty">No actions yet.</p>{% endfor %}</div></section>
{% endblock %}
