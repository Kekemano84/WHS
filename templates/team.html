{% extends "base.html" %}
{% block title %}Team{% endblock %}
{% block content %}
<section class="panel compact-panel">
    <div class="panel-head">
        <div><h3>Add Team Member</h3><p class="muted">Track roles, licence notes and probation dates.</p></div>
        <span class="pill">PRO</span>
    </div>

    <form method="POST" class="form-grid compact-form">
        <div><label>Name</label><input name="name" placeholder="Jake Nicholson"></div>
        <div>
            <label>Role</label>
            <select name="role_select"><option>Manager</option><option>Supervisor</option><option>Team Leader</option><option>Bay Staff</option><option>Driver</option><option>Admin</option><option>Other</option></select>
        </div>
        <div><label>Custom Role</label><input name="custom_role" placeholder="e.g. Yard Marshal"></div>
        <div><label>Email</label><input type="email" name="email"></div>
        <div><label>Phone</label><input name="phone" placeholder="Optional"></div>
        <div><label>Status</label><select name="status"><option>Active</option><option>Inactive</option><option>Holiday</option><option>Sick</option><option>Terminated</option></select></div>
        <div><label>Probation Start</label><input type="date" name="probation_start"></div>
        <div><label>Probation End</label><input type="date" name="probation_end"></div>
        <div><label>Licence Expiry</label><input type="date" name="licence_expiry"></div>
        <div><label>Training Type</label><input name="training_type" placeholder="MHE / First Aid / Fire Marshal"></div>
        <div><label>Training Expiry</label><input type="date" name="training_expiry"></div>
        <div><label>Probation Status</label><select name="probation_status"><option>Not set</option><option>In progress</option><option>Passed</option><option>Extended</option><option>Terminated</option></select></div>
        <div class="wide"><label>Notes</label><input name="notes" placeholder="Skills, restrictions, licence expiry, training expiry, comment"></div>
        <input type="hidden" name="permissions" value="View only">
        <div class="form-actions"><button class="btn primary" type="submit">Add Member</button></div>
    </form>
</section>

<section class="panel compact-panel">
    <div class="panel-head"><h3>Team Members</h3><a class="small-btn export-btn" href="{{ url_for('export_team') }}">[📊 Export Excel]</a></div>
    {% for row in rows %}
    <form method="POST" action="{{ url_for('update_team_member', member_id=row.id) }}" class="team-edit-card form-grid compact-form">
        <div><label>Name</label><input name="name" value="{{ row.name }}"></div>
        <div><label>Role</label><input name="role" value="{{ row.role }}"></div>
        <div><label>Email</label><input name="email" value="{{ row.email or '' }}"></div>
        <div><label>Phone</label><input name="phone" value="{{ row.phone or '' }}"></div>
        <div><label>Status</label><select name="status">
            {% for s in ['Active','Inactive','Holiday','Sick','Terminated'] %}<option {% if row.status==s %}selected{% endif %}>{{ s }}</option>{% endfor %}
        </select></div>
        <div><label>Probation Start</label><input type="date" name="probation_start" value="{{ row.probation_start or '' }}"></div>
        <div><label>Probation End</label><input type="date" name="probation_end" value="{{ row.probation_end or '' }}"></div>
        <div><label>Licence Expiry</label><input type="date" name="licence_expiry" value="{{ row.licence_expiry or '' }}"></div>
        <div><label>Training Type</label><input name="training_type" value="{{ row.training_type or '' }}"></div>
        <div><label>Training Expiry</label><input type="date" name="training_expiry" value="{{ row.training_expiry or '' }}"></div>
        <div><label>Probation Status</label><select name="probation_status">
            {% for s in ['Not set','In progress','Passed','Extended','Terminated'] %}<option {% if row.probation_status==s %}selected{% endif %}>{{ s }}</option>{% endfor %}
        </select></div>
        <div class="wide"><label>Notes</label><input name="notes" value="{{ row.notes or '' }}"></div>
        <div class="wide mini-actions">
            <button class="small-btn" type="submit">Save Changes</button>
            <button class="small-btn danger-btn" formaction="{{ url_for('delete_team_member', member_id=row.id) }}" onclick="return confirm('Delete this team member?')" type="submit">Delete</button>
        </div>
    </form>
    {% else %}<p class="empty">No team members yet.</p>{% endfor %}
</section>
{% endblock %}
